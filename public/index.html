<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Search Scoring Configurator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1923; font-family: 'Space Grotesk', sans-serif; }
  input[type="range"] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #9FE1CB; cursor: pointer; border: 2px solid #0f1923; }
  input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #9FE1CB; cursor: pointer; border: 2px solid #0f1923; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0c1520; }
  ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useMemo, useCallback, createElement: h } = React;

const DIMENSION_META = {
  role: { label: "Role fit", color: "#5DCAA5", desc: "Title match to your targets" },
  vertical: { label: "Vertical fit", color: "#85B7EB", desc: "Web3 sector alignment" },
  channel: { label: "Channel quality", color: "#EF9F27", desc: "Source reliability signal" },
  team: { label: "Team / stage", color: "#AFA9EC", desc: "Project maturity & funding" },
  geo: { label: "Geo / timezone", color: "#ED93B1", desc: "Location compatibility" },
  metrics: { label: "Metrics clarity", color: "#F0997B", desc: "Listing quality & comp info" },
};

const DEFAULT_WEIGHTS = { role: 30, vertical: 20, channel: 15, team: 15, geo: 10, metrics: 10 };

const DEMO_JOBS = [
  { id:"a1", title:"Community Lead", company:"Chainlink", category:"Oracle", url:"#", location:"Remote", salary:{min:90000,max:130000}, scraped_at:new Date().toISOString(), traits:{role:95,vertical:90,channel:85,team:92,geo:88,metrics:75} },
  { id:"a2", title:"Growth Manager", company:"Aave", category:"DeFi", url:"#", location:"Remote - Americas", salary:{min:80000,max:120000}, scraped_at:new Date().toISOString(), traits:{role:92,vertical:88,channel:80,team:90,geo:85,metrics:70} },
  { id:"a3", title:"KOL Manager", company:"Arbitrum", category:"L2", url:"#", location:"Remote", salary:{min:70000,max:100000}, scraped_at:new Date().toISOString(), traits:{role:90,vertical:85,channel:88,team:88,geo:80,metrics:65} },
  { id:"a4", title:"Marketing Lead", company:"Polygon", category:"L2", url:"#", location:"Remote - Global", salary:{min:85000,max:140000}, scraped_at:new Date().toISOString(), traits:{role:88,vertical:82,channel:75,team:85,geo:90,metrics:80} },
  { id:"a5", title:"Head of Community", company:"Immutable", category:"Gaming", url:"#", location:"Remote", salary:{min:100000,max:150000}, scraped_at:new Date().toISOString(), traits:{role:96,vertical:78,channel:90,team:80,geo:75,metrics:85} },
  { id:"a6", title:"Social Media Manager", company:"Magic Eden", category:"NFT", url:"#", location:"Remote", salary:null, scraped_at:new Date().toISOString(), traits:{role:75,vertical:70,channel:82,team:78,geo:85,metrics:55} },
  { id:"a7", title:"Developer Relations", company:"Solana", category:"L1", url:"#", location:"Remote - Americas", salary:{min:120000,max:180000}, scraped_at:new Date().toISOString(), traits:{role:72,vertical:92,channel:95,team:95,geo:90,metrics:90} },
  { id:"a8", title:"Content Manager", company:"Ondo Finance", category:"RWA", url:"#", location:"Remote", salary:{min:65000,max:95000}, scraped_at:new Date().toISOString(), traits:{role:82,vertical:88,channel:70,team:75,geo:80,metrics:60} },
  { id:"a9", title:"Partnership Manager", company:"LayerZero", category:"Bridge", url:"#", location:"Remote", salary:null, scraped_at:new Date().toISOString(), traits:{role:78,vertical:72,channel:78,team:82,geo:78,metrics:50} },
  { id:"b1", title:"Community Manager", company:"Kraken", category:"CEX", url:"#", location:"Remote - LATAM", salary:{min:55000,max:85000}, scraped_at:new Date().toISOString(), traits:{role:94,vertical:80,channel:92,team:88,geo:95,metrics:82} },
  { id:"b2", title:"Growth Lead", company:"Bitso", category:"CEX", url:"#", location:"Buenos Aires", salary:{min:45000,max:70000}, scraped_at:new Date().toISOString(), traits:{role:90,vertical:82,channel:85,team:80,geo:98,metrics:78} },
  { id:"b3", title:"Senior Solidity Engineer", company:"Uniswap", category:"DeFi", url:"#", location:"Remote", salary:{min:180000,max:250000}, scraped_at:new Date().toISOString(), traits:{role:20,vertical:90,channel:95,team:95,geo:85,metrics:92} },
  { id:"b4", title:"DevOps Engineer", company:"Circle", category:"Stablecoin", url:"#", location:"Remote", salary:{min:140000,max:200000}, scraped_at:new Date().toISOString(), traits:{role:15,vertical:85,channel:90,team:92,geo:82,metrics:88} },
  { id:"b5", title:"Community Growth Lead", company:"Avalanche", category:"L1", url:"#", location:"Remote - Americas", salary:{min:75000,max:110000}, scraped_at:new Date().toISOString(), traits:{role:95,vertical:88,channel:88,team:85,geo:88,metrics:72} },
  { id:"b6", title:"Marketing Manager", company:"Hedera", category:"L1", url:"#", location:"Remote", salary:{min:80000,max:120000}, scraped_at:new Date().toISOString(), traits:{role:88,vertical:80,channel:82,team:78,geo:80,metrics:70} },
];

function scoreJob(job, weights) {
  const totalWeight = Object.values(weights).reduce((a,b)=>a+b,0)||1;
  let score = 0;
  Object.keys(DIMENSION_META).forEach(d => { score += ((job.traits?.[d]||0) * weights[d]) / totalWeight; });
  return Math.round(score);
}

function App() {
  const [weights, setWeights] = useState(DEFAULT_WEIGHTS);
  const [savedWeights, setSavedWeights] = useState(DEFAULT_WEIGHTS);
  const [compareMode, setCompareMode] = useState(false);
  const [filter, setFilter] = useState("");
  const [minScore, setMinScore] = useState(0);
  const [sortBy, setSortBy] = useState("score");
  const [selectedCategory, setSelectedCategory] = useState("All");
  const [jobs, setJobs] = useState(DEMO_JOBS);
  const [dataSource, setDataSource] = useState("demo");

  useEffect(() => {
    fetch("/data/jobs.json").then(r=>r.json()).then(data => {
      if (data.jobs && data.jobs.length > 0) {
        const withTraits = data.jobs.map(j => ({
          ...j,
          traits: j.traits || { role: Math.random()*100|0, vertical: Math.random()*100|0, channel: Math.random()*100|0, team: Math.random()*100|0, geo: Math.random()*100|0, metrics: Math.random()*100|0 }
        }));
        setJobs(withTraits);
        setDataSource("live");
      }
    }).catch(()=>{});
  }, []);

  const totalWeight = useMemo(()=>Object.values(weights).reduce((a,b)=>a+b,0),[weights]);
  const scoredJobs = useMemo(()=>jobs.map(j=>({...j, currentScore:scoreJob(j,weights), savedScore:scoreJob(j,savedWeights)})),[jobs,weights,savedWeights]);
  const categories = useMemo(()=>{const c=new Set(jobs.map(j=>j.category));return["All",...Array.from(c).sort()];},[jobs]);

  const filtered = useMemo(()=>{
    let r = scoredJobs;
    if(filter) r=r.filter(j=>j.title.toLowerCase().includes(filter.toLowerCase())||j.company.toLowerCase().includes(filter.toLowerCase()));
    if(selectedCategory!=="All") r=r.filter(j=>j.category===selectedCategory);
    if(minScore>0) r=r.filter(j=>j.currentScore>=minScore);
    if(sortBy==="score") r.sort((a,b)=>b.currentScore-a.currentScore);
    else if(sortBy==="company") r.sort((a,b)=>a.company.localeCompare(b.company));
    return r;
  },[scoredJobs,filter,minScore,sortBy,selectedCategory]);

  const buckets = useMemo(()=>{const b={hot:0,warm:0,cold:0,ice:0};scoredJobs.forEach(j=>{const s=j.currentScore;if(s>=80)b.hot++;else if(s>=60)b.warm++;else if(s>=40)b.cold++;else b.ice++;});return b;},[scoredJobs]);
  const maxBucket = Math.max(...Object.values(buckets),1);

  const exportConfig = ()=>{
    const cfg={scoring:{dimensions:{}},exported_at:new Date().toISOString()};
    Object.keys(DIMENSION_META).forEach(d=>{cfg.scoring.dimensions[d]={weight:weights[d]/100};});
    const blob=new Blob([JSON.stringify(cfg,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="scoring-config.json";a.click();URL.revokeObjectURL(url);
  };

  const s = (tag,props,...children) => h(tag,props,...children);

  return h("div",{style:{color:"#B5D4F4",minHeight:"100vh",padding:"20px 24px"}},
    // Header
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24,flexWrap:"wrap",gap:12}},
      h("div",null,
        h("h1",{style:{fontSize:22,fontWeight:600,color:"#e8f4fd",marginBottom:4,letterSpacing:"-0.5px"}},"Scoring configurator"),
        h("p",{style:{fontSize:13,color:"#5a7a9a"}},
          `Tune weights in real time  ·  ${jobs.length} jobs (${dataSource})  ·  ${totalWeight}% total weight`
        )
      ),
      h("div",{style:{display:"flex",gap:8}},
        h("button",{onClick:()=>{setSavedWeights({...weights});setCompareMode(false);},style:{fontSize:12,padding:"6px 14px",background:"#162d44",color:"#9FE1CB",border:"1px solid #1e3a5f",borderRadius:6,cursor:"pointer",fontFamily:"inherit"}},"Save snapshot"),
        h("button",{onClick:()=>setCompareMode(!compareMode),style:{fontSize:12,padding:"6px 14px",background:compareMode?"#1e3a5f":"#162d44",color:compareMode?"#5DCAA5":"#85B7EB",border:`1px solid ${compareMode?"#5DCAA5":"#1e3a5f"}`,borderRadius:6,cursor:"pointer",fontFamily:"inherit"}},compareMode?"Hide compare":"A/B compare"),
        h("button",{onClick:exportConfig,style:{fontSize:12,padding:"6px 14px",background:"#162d44",color:"#EF9F27",border:"1px solid #1e3a5f",borderRadius:6,cursor:"pointer",fontFamily:"inherit"}},"Export config"),
      )
    ),
    // Main grid
    h("div",{style:{display:"grid",gridTemplateColumns:"300px minmax(0,1fr)",gap:20,alignItems:"start"}},
      // Left panel
      h("div",{style:{position:"sticky",top:20}},
        h("div",{style:{background:"#0c1520",border:"1px solid #1e3a5f",borderRadius:10,padding:20}},
          h("div",{style:{fontSize:14,fontWeight:500,color:"#e8f4fd",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("span",null,"Weight sliders"),
            h("button",{onClick:()=>setWeights(DEFAULT_WEIGHTS),style:{fontSize:10,color:"#5a7a9a",background:"none",border:"1px solid #1e3a5f",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontFamily:"inherit"}},"Reset")
          ),
          ...Object.keys(DIMENSION_META).map(dim=>{
            const meta=DIMENSION_META[dim];
            return h("div",{key:dim,style:{marginBottom:14}},
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}},
                h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                  h("div",{style:{width:8,height:8,borderRadius:"50%",background:meta.color}}),
                  h("span",{style:{fontSize:13,color:"#9FE1CB",fontWeight:500}},meta.label)
                ),
                h("span",{style:{fontSize:13,color:meta.color,fontFamily:"'JetBrains Mono',monospace",fontWeight:500}},weights[dim]+"%")
              ),
              h("input",{type:"range",min:0,max:50,value:weights[dim],step:5,onChange:e=>setWeights(p=>({...p,[dim]:parseInt(e.target.value)})),style:{width:"100%",height:4,background:`linear-gradient(to right, ${meta.color} ${weights[dim]*2}%, #162d44 ${weights[dim]*2}%)`,borderRadius:2,cursor:"pointer"}}),
              h("div",{style:{fontSize:11,color:"#5a7a9a",marginTop:2}},meta.desc)
            );
          })
        ),
        // Distribution
        h("div",{style:{background:"#0c1520",border:"1px solid #1e3a5f",borderRadius:10,padding:16,marginTop:12}},
          h("div",{style:{fontSize:13,fontWeight:500,color:"#e8f4fd",marginBottom:12}},"Score distribution"),
          h("div",{style:{display:"flex",gap:8,alignItems:"flex-end",height:60,padding:"0 4px"}},
            ...[{l:"Hot",c:buckets.hot,cl:"#5DCAA5"},{l:"Warm",c:buckets.warm,cl:"#EF9F27"},{l:"Cold",c:buckets.cold,cl:"#85B7EB"},{l:"Skip",c:buckets.ice,cl:"#F09595"}].map(b=>
              h("div",{key:b.l,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
                h("span",{style:{fontSize:11,color:b.cl,fontFamily:"'JetBrains Mono',monospace",fontWeight:500}},b.c),
                h("div",{style:{width:"100%",background:b.cl,borderRadius:"2px 2px 0 0",height:`${(b.c/maxBucket)*40}px`,minHeight:2,transition:"height 0.4s ease"}}),
                h("span",{style:{fontSize:9,color:"#5a7a9a",textTransform:"uppercase",letterSpacing:"0.5px"}},b.l)
              )
            )
          )
        ),
        // Stats
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}},
          h("div",{style:{background:"#0c1520",border:"1px solid #1e3a5f",borderRadius:8,padding:"10px 12px"}},
            h("div",{style:{fontSize:10,color:"#5a7a9a",textTransform:"uppercase",letterSpacing:"0.5px"}},"Avg score"),
            h("div",{style:{fontSize:20,fontWeight:600,color:"#9FE1CB",fontFamily:"'JetBrains Mono',monospace"}},Math.round(scoredJobs.reduce((s,j)=>s+j.currentScore,0)/scoredJobs.length))
          ),
          h("div",{style:{background:"#0c1520",border:"1px solid #1e3a5f",borderRadius:8,padding:"10px 12px"}},
            h("div",{style:{fontSize:10,color:"#5a7a9a",textTransform:"uppercase",letterSpacing:"0.5px"}},"Hot leads"),
            h("div",{style:{fontSize:20,fontWeight:600,color:"#5DCAA5",fontFamily:"'JetBrains Mono',monospace"}},buckets.hot)
          )
        )
      ),
      // Right panel
      h("div",null,
        h("div",{style:{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}},
          h("input",{type:"text",placeholder:"Filter by title or company...",value:filter,onChange:e=>setFilter(e.target.value),style:{flex:1,minWidth:180,padding:"8px 12px",fontSize:13,background:"#0c1520",border:"1px solid #1e3a5f",borderRadius:6,color:"#B5D4F4",outline:"none",fontFamily:"inherit"}}),
          h("select",{value:selectedCategory,onChange:e=>setSelectedCategory(e.target.value),style:{padding:"8px 12px",fontSize:13,background:"#0c1520",border:"1px solid #1e3a5f",borderRadius:6,color:"#B5D4F4",fontFamily:"inherit"}},
            ...categories.map(c=>h("option",{key:c,value:c},c))
          ),
          h("select",{value:sortBy,onChange:e=>setSortBy(e.target.value),style:{padding:"8px 12px",fontSize:13,background:"#0c1520",border:"1px solid #1e3a5f",borderRadius:6,color:"#B5D4F4",fontFamily:"inherit"}},
            h("option",{value:"score"},"Sort: Score"),
            h("option",{value:"company"},"Sort: Company")
          )
        ),
        h("div",{style:{fontSize:12,color:"#5a7a9a",marginBottom:10}},`Showing ${filtered.length} of ${jobs.length} jobs`),
        h("div",{style:{display:"flex",flexDirection:"column",gap:6}},
          ...filtered.map(job=>
            h("div",{key:job.id,style:{background:"#0c1520",border:"1px solid #1e3a5f",borderRadius:8,padding:"12px 16px",display:"grid",gridTemplateColumns:compareMode?"1fr auto auto auto":"1fr auto auto",gap:12,alignItems:"center",borderLeft:`3px solid ${job.currentScore>=80?"#5DCAA5":job.currentScore>=60?"#EF9F27":"#1e3a5f"}`}},
              h("div",null,
                h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}},
                  h("span",{style:{fontSize:14,fontWeight:500,color:"#e8f4fd"}},job.title),
                  h("span",{style:{fontSize:10,color:{"L1":"#85B7EB","L2":"#AFA9EC","DeFi":"#5DCAA5","CEX":"#EF9F27","Oracle":"#ED93B1","Gaming":"#F0997B","RWA":"#97C459"}[job.category]||"#5a7a9a",background:({"L1":"#85B7EB","L2":"#AFA9EC","DeFi":"#5DCAA5","CEX":"#EF9F27","Oracle":"#ED93B1","Gaming":"#F0997B","RWA":"#97C459"}[job.category]||"#5a7a9a")+"18",padding:"2px 8px",borderRadius:4,textTransform:"uppercase",letterSpacing:"0.5px",fontWeight:500,whiteSpace:"nowrap"}},job.category)
                ),
                h("div",{style:{display:"flex",gap:12,fontSize:12,color:"#5a7a9a",flexWrap:"wrap"}},
                  h("span",{style:{color:"#85B7EB"}},job.company),
                  h("span",null,job.location),
                  job.salary&&h("span",{style:{color:"#9FE1CB"}},`$${Math.round(job.salary.min/1000)}k - $${Math.round(job.salary.max/1000)}k`)
                )
              ),
              compareMode&&h("div",{style:{textAlign:"center"}},
                h("div",{style:{fontSize:9,color:"#5a7a9a",marginBottom:2}},"SAVED"),
                h("span",{style:{fontSize:14,fontFamily:"'JetBrains Mono',monospace",color:"#5a7a9a"}},job.savedScore)
              ),
              h("div",{style:{display:"flex",alignItems:"center",gap:8,minWidth:120}},
                h("div",{style:{flex:1,height:6,background:"#162d44",borderRadius:3,overflow:"hidden"}},
                  h("div",{style:{width:`${job.currentScore}%`,height:"100%",background:job.currentScore>=80?"#5DCAA5":job.currentScore>=60?"#EF9F27":"#F09595",borderRadius:3,transition:"width 0.4s ease"}})
                ),
                h("span",{style:{fontSize:13,fontWeight:500,color:job.currentScore>=80?"#5DCAA5":job.currentScore>=60?"#EF9F27":"#F09595",minWidth:28,textAlign:"right",fontFamily:"'JetBrains Mono',monospace"}},job.currentScore)
              ),
              compareMode&&h("div",{style:{fontSize:13,fontFamily:"'JetBrains Mono',monospace",color:job.currentScore>job.savedScore?"#5DCAA5":job.currentScore<job.savedScore?"#F09595":"#5a7a9a",minWidth:40,textAlign:"right"}},(job.currentScore>job.savedScore?"+":"")+(job.currentScore-job.savedScore))
            )
          )
        ),
        filtered.length===0&&h("div",{style:{textAlign:"center",padding:40,color:"#5a7a9a",fontSize:14}},"No jobs match the current filters.")
      )
    ),
    // Footer
    h("div",{style:{marginTop:32,padding:"16px 0",borderTop:"1px solid #1e3a5f",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,color:"#5a7a9a"}},
      h("span",null,"Job Search Scoring Configurator v2.0  ·  Config-driven  ·  Fork & customize"),
      h("span",null,"Data refreshes 5x daily via staggered scraper")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
