name: Daily Job Search

on:
  schedule:
    # 8:00 AM Buenos Aires (UTC-3) = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Search Agent
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python3 job_search_agent_v2.py --verbose

      - name: Commit updated digest to repo
        run: |
          git config user.name "Job Search Bot"
          git config user.email "bot@jobsearch.local"
          git add public/index.html || true
          git diff --cached --quiet || git commit -m "Daily digest $(date +%Y-%m-%d)"
          git push || true
